name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "cursor/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      macos: ${{ steps.filter.outputs.macos }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            macos:
              - 'macOS/**'
              - '.github/workflows/tests.yml'

  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.macos == 'true'
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use Xcode 16 if available, otherwise fall back to the default
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Generate Xcode project
        run: |
          # Install xcodegen if not present
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi
          cd macOS && xcodegen generate

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project macOS/Synapse.xcodeproj \
            -scheme Synapse

      - name: Install xcpretty
        run: gem install xcpretty --no-document 2>/dev/null || true

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project macOS/Synapse.xcodeproj \
            -scheme Synapse \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output test-results.xml
        env:
          NSUnbufferedIO: YES

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
