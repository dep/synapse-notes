name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use Xcode 16 if available, otherwise fall back to the default
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Noted.xcodeproj \
            -scheme Noted

      - name: Install xcpretty
        run: gem install xcpretty --no-document 2>/dev/null || true

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Noted.xcodeproj \
            -scheme Noted \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output test-results.xml
        env:
          NSUnbufferedIO: YES

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
