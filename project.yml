name: Noted
options:
  bundleIdPrefix: com.noted
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.2.0

targets:
  Noted:
    type: application
    platform: macOS
    sources:
      - Noted
      - Noted/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noted.app
        SWIFT_VERSION: 5.0
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: Noted/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: 299R8V27FZ
          CODE_SIGN_IDENTITY: Developer ID Application
    dependencies:
      - package: SwiftTerm
    entitlements:
      path: Noted/Noted.entitlements
      properties:
        com.apple.security.app-sandbox: false

  NotedTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - NotedTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noted.app.tests
        SWIFT_VERSION: 5.0
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Noted.app/Contents/MacOS/Noted"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Noted
