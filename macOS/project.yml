name: Synapse Notes
options:
  bundleIdPrefix: com.SynapseNotes
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.2.0
  Grape:
    url: https://github.com/SwiftGraphs/Grape
    from: 1.1.0
  Yams:
    url: https://github.com/jpsim/Yams
    from: 6.2.1
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  Synapse:
    type: application
    platform: macOS
    sources:
      - SynapseNotes
      - SynapseNotes/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.SynapseNotes.app
        PRODUCT_NAME: Synapse Notes
        PRODUCT_MODULE_NAME: Synapse
        SWIFT_VERSION: 5.0
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: SynapseNotes/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: 299R8V27FZ
          CODE_SIGN_IDENTITY: Developer ID Application
    dependencies:
      - package: SwiftTerm
      - package: Grape
      - package: Yams
      - package: Sparkle
    entitlements:
      path: SynapseNotes/SynapseNotes.entitlements
      properties:
        com.apple.security.app-sandbox: false

  SynapseTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SynapseNotesTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.SynapseNotes.app.tests
        SWIFT_VERSION: 5.0
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Synapse Notes.app/Contents/MacOS/Synapse Notes"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Synapse
